<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chai UI Kanban</title>
</head>

<body chai-ui="bg-gray-100 dark:bg-gray-900 text-black dark:text-white p-20 h-[100vh]">

  <h1 chai-ui="textalign-center fontsize-3xl font-bold mb-20 text-yellow-500">
    Chai UI Kanban Board
  </h1>

  <button 
    onclick="document.documentElement.classList.toggle('dark')"
    chai-ui="bg-blue-500 dark:bg-blue-700 text-white p-10 rounded-md cursor-pointer hover:bg-blue-600 transition mb-20"
  >
    Toggle Dark Mode
  </button>


  <!-- ===== BOARD ===== -->
  <div chai-ui="flex gap-20 justify-center flex-wrap">

    <!-- COLUMN -->
    <div class="column" 
      chai-ui="bg-gray-200 dark:bg-gray-800 p-15 rounded-lg w-300 min-h-[400px] border border-gray-400 dark:border-gray-700">
      <h2 chai-ui="mb-10">Todo</h2>
      <div class="tasks"></div>
      <button class="add-btn" 
        chai-ui="mt-10 w-full p-10 bg-yellow-400 text-black rounded-md cursor-pointer hover:bg-yellow-500 transition">
        + Add Task
      </button>
    </div>

    <!-- COLUMN -->
    <div class="column" 
      chai-ui="bg-gray-200 dark:bg-gray-800 p-15 rounded-lg w-300 min-h-[400px] border border-gray-400 dark:border-gray-700">
      <h2 chai-ui="mb-10">In Progress</h2>
      <div class="tasks"></div>
      <button class="add-btn" 
        chai-ui="mt-10 w-full p-10 bg-yellow-400 text-black rounded-md cursor-pointer hover:bg-yellow-500 transition">
        + Add Task
      </button>
    </div>

    <!-- COLUMN -->
    <div class="column" 
      chai-ui="bg-gray-200 dark:bg-gray-800 p-15 rounded-lg w-300 min-h-[400px] border border-gray-400 dark:border-gray-700">
      <h2 chai-ui="mb-10">Done</h2>
      <div class="tasks"></div>
      <button class="add-btn" 
        chai-ui="mt-10 w-full p-10 bg-yellow-400 text-black rounded-md cursor-pointer hover:bg-yellow-500 transition">
        + Add Task
      </button>
    </div>

  </div>


  <!-- ===== MODAL (Z-INDEX BASED) ===== -->
  <div id="task-modal"
    chai-ui="fixed top-0 left-0 w-[100%] h-[100%] flex justify-center items-center bg-black opacity-0 negz-1 transition">

    <div chai-ui="bg-white dark:bg-gray-800 text-black dark:text-white p-20 rounded-lg w-300 flex flex-col gap-10 scale-1">

      <input id="task-input" 
        placeholder="Enter task..."
        chai-ui="p-10 border border-gray-400 dark:border-gray-600 rounded-md w-full"
      />

      <div chai-ui="flex gap-10 justify-end">
        <button onclick="closeModal()" 
          chai-ui="p-10 bg-gray-400 rounded-md cursor-pointer">
          Cancel
        </button>

        <button onclick="addTask()" 
          chai-ui="p-10 bg-yellow-400 rounded-md cursor-pointer">
          Add
        </button>
      </div>

    </div>
  </div>


  <!-- ===== MAIN SCRIPT ===== -->
  <script>
    const columns = document.querySelectorAll(".column");
    let draggedTask = null;
    let currentColumn = null;

    const modal = document.getElementById("task-modal");
    const input = document.getElementById("task-input");

    // OPEN MODAL
    function openModal() {
      modal.style.opacity = "1";
      modal.style.zIndex = "1000";
      input.focus();
    }

    // CLOSE MODAL
    function closeModal() {
      modal.style.opacity = "0";
      modal.style.zIndex = "-1";
      input.value = "";
    }

    // BUTTON CLICK
    document.addEventListener("click", (e) => {
      if (e.target.classList.contains("add-btn")) {
        currentColumn = e.target.previousElementSibling;
        openModal();
      }
    });

    // ADD TASK
    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const task = document.createElement("div");

      task.setAttribute(
        "chai-ui",
        "bg-gray-300 dark:bg-gray-700 text-black dark:text-white p-10 mb-10 rounded-md cursor-pointer border border-gray-400 dark:border-gray-600 hover:border-yellow-400 transition"
      );

      task.textContent = text;
      task.setAttribute("draggable", true);

      currentColumn.appendChild(task);
      closeModal();
    }

    // ENTER KEY
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });

    // CLICK OUTSIDE CLOSE
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    // DRAG START
    document.addEventListener("dragstart", (e) => {
      if (e.target.hasAttribute("chai-ui")) {
        draggedTask = e.target;
        e.target.style.opacity = "0.5";
      }
    });

    // DRAG END
    document.addEventListener("dragend", (e) => {
      if (e.target.hasAttribute("chai-ui")) {
        e.target.style.opacity = "1";
        draggedTask = null;
      }
    });

    // DROP
    columns.forEach((col) => {
      col.addEventListener("dragover", (e) => {
        e.preventDefault();
        col.style.border = "2px dashed #facc15";
      });

      col.addEventListener("dragleave", () => {
        col.style.border = "";
      });

      col.addEventListener("drop", () => {
        col.style.border = "";

        if (draggedTask) {
          col.querySelector(".tasks").appendChild(draggedTask);
        }
      });
    });
  </script>


  <!-- ===== CHAI UI ENGINE ===== -->
  <script type="module" src="./ui-lib/index.js"></script>

</body>
</html>
